<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUP Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="back p-5">
        <form class="container border p-2">
            <h1><img src="https://www.pngfind.com/pngs/m/577-5776972_newsletter-sign-up-button-newsletter-signup-button-hd.png" class="size"></h1>
            <hr>
            <div class="mb-3 row p-2">
                <label for="name" class="col-sm-12 col-form-label">Name :</label>
                <div class="col-sm-12">
                    <input type="text" class="form-control" id="name">
                </div>
            </div>
            <div class="mb-3 row p-2">
                <label for="email" class="col-sm-12 col-form-label">Email :</label>
                <div class="col-sm-12">
                    <input type="text" class="form-control" id="email">
                </div>
            </div>
            <div class="mb-3 row p-2">
                <label for="passward" class="col-sm-12 col-form-label">Password :</label>
                <div class="col-sm-12">
                    <input type="password" class="form-control" id="passward">
                </div>
            </div>
            <div class="mb-3 row p-2">
                <label for="ConfirmPassward" class="col-sm-12 col-form-label">Confirm Password :</label>
                <div class="col-sm-12">
                    <input type="ConfirmPassword" class="form-control" id="passward">
                </div>
            </div>
            <div class="mb-3 row p-2">
                <div class="col-sm-12">
                    <button type="button" class="btn btnBlue">SignUP</button>
                </div>
            </div>
            <p>Already have an account? <a href="login.html" class="link">login</a></p>
        </form>
    </div>

<script src="app.js"></script>
</body>

</html>
