<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="back p-5"
        style="background-image: url('https://marketplace.canva.com/EAEbucQENfs/2/0/1600w/-dark-green-waves-all-business-linktree-background-tbs6SYB7UuA.jpg');">
        <form class="container border p-3">
            <h1><img src="image/images-removebg-preview.png" class="size"></h1>
            <hr>
            <div class="mb-3 row p-2">
                <label for="email" class="col-sm-12 col-form-label">Email:</label>
                <div class="col-sm-12">
                    <input type="text" class="form-control" id="email">
                </div>
            </div>
            <div class="mb-3 row p-2">
                <label for="passward" class="col-sm-12 col-form-label">Password:</label>
                <div class="col-sm-12">
                    <input type="password" class="form-control" id="password">
                </div>
            </div>
            <div class="mb-3 row m-2">
                <p class="p-0 forgetPassward" id="">Forget Passward</p>
                <button class="btn btnGreen col-sm-4" id="sign_in">sign In</button>
                <p class="p-0">Don't have an account? <a href="index.html" id="link2">Sign Up</a></p>
            </div>
        </form>
    </div>

    <script type="module" src="firebase.js"></script>
</body>

</html>
